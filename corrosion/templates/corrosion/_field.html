<div class="mb-2">
  <label for="{{ field.id_for_label }}" class="form-label small fw-semibold mb-1">{{ field.label }}</label>
  {% if field.field.widget.input_type == "select" %}
    <select name="{{ field.html_name }}" id="{{ field.id_for_label }}"
            class="form-select form-select-sm {% if field.errors %}is-invalid{% endif %}">
      {% for val, txt in field.field.choices %}
        <option value="{{ val }}" {% if field.value == val|stringformat:"s" %}selected{% endif %}>{{ txt }}</option>
      {% endfor %}
    </select>
  {% elif field.field.widget.input_type == "textarea" %}
    <textarea name="{{ field.html_name }}" id="{{ field.id_for_label }}"
              class="form-control form-control-sm {% if field.errors %}is-invalid{% endif %}"
              rows="4" placeholder="{{ field.field.widget.attrs.placeholder|default:'' }}">{{ field.value|default:'' }}</textarea>
  {% else %}
    <input type="{{ field.field.widget.input_type }}"
           name="{{ field.html_name }}"
           id="{{ field.id_for_label }}"
           value="{{ field.value|default:'' }}"
           class="form-control form-control-sm {% if field.errors %}is-invalid{% endif %}"
           {% for attr, val in field.field.widget.attrs.items %}{{ attr }}="{{ val }}" {% endfor %}>
  {% endif %}
  {% if field.errors %}
    <div class="invalid-feedback">{{ field.errors|join:", " }}</div>
  {% endif %}
  {% if field.help_text %}
    <div class="form-text small">{{ field.help_text }}</div>
  {% endif %}
</div>
